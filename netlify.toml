[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions.api]
  timeout = 26

[build]
  command = "cd apps/web-sandbox && npm install && npm run build"
  publish = "apps/web-sandbox/dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/generate-visualization"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/api/catalogue"
  to = "/.netlify/functions/api"
  status = 200
  force = true
