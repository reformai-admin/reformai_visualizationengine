name: Deploy vis-service to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/vis-service/**'

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Extract GCP project ID from credentials
        id: gcp
        run: |
          PROJECT_ID=$(echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}' | jq -r .project_id)
          echo "project_id=$PROJECT_ID" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy reform-ai-vis \
            --source apps/vis-service \
            --region us-central1 \
            --project ${{ steps.gcp.outputs.project_id }} \
            --set-env-vars API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --quiet
